version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: traveltrek-db
    restart: always
    environment:
      POSTGRES_DB: traveltrek
      POSTGRES_USER: traveltrek_admin
      POSTGRES_PASSWORD: traveltrek_secure_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Mock Blockchain node for testing smart contracts
  mock-blockchain:
    image: trufflesuite/ganache-cli:latest
    container_name: traveltrek-blockchain-node
    restart: always
    ports:
      - "8545:8545"
    command: ["ganache-cli", "-h", "0.0.0.0", "-p", "8545", "--db", "/app/db", "-m", "clutch captain shoebox salt detail state logic state heavy close dry status"]
    volumes:
      - ganache_data:/app/db

volumes:
  pgdata:
    driver: local
  ganache_data:
    driver: local

<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TravelSure Control Centre Dashboard - Smart Tourist Safety Monitoring, live GPS tracking, incident response, and active geo-fencing system." />
    <title>TravelSure Control Centre - Tourist Safety Operations</title>
    <script>
      // Prevent flash-of-wrong-theme: apply dark class before first paint
      (function() {
        var stored = localStorage.getItem('travelsure-dark-mode');
        var isDark = stored !== null ? stored === 'true' : true;
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

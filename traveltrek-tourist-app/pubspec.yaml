name: traveltrek_tourist_app
description: TravelTrek Smart Tourist Safety & Incident Response System - Mobile App.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & Routing
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Database & Storage (Offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0

  # Location & Sensors
  geolocator: ^11.0.0
  sensors_plus: ^4.1.0

  # Background Workers
  workmanager: ^0.5.2

  # Networking & Real-time Alerts
  http: ^1.1.0
  web_socket_channel: ^2.4.1

  # Bluetooth Mesh (BLE) Fallback
  flutter_blue_plus: ^1.31.0

  # Blockchain Identity Integration
  web3dart: ^2.6.1

  # UI / Assets / Utilities
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
